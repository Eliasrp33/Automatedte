<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log in | Automated Reception</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-blur"></div>
    <main class="container" style="padding-top:40px;">
      <section class="card" style="max-width:480px;margin:40px auto;padding:24px;">
        <h2>Log in</h2>
        <p class="muted">Sign in to open your dashboard.</p>

        <label>Email</label>
        <input id="emailInput" type="email" placeholder="laseelias2@gamil" style="width:100%;margin:6px 0 12px;" />

        <label>Password</label>
        <input id="passInput" type="password" placeholder="••••••••" style="width:100%;margin:6px 0 12px;" />

        <p id="loginError" class="error" hidden>Wrong email or password.</p>

        <div class="contact-row">
          <button id="submitLogin" class="btn" type="button">Log in</button>
          <a class="btn ghost" href="/">Back</a>
        </div>
      </section>
    </main>

    <script>
      const VALID_EMAILS = ['laseelias2@gamil', 'laseelias2@gmail.com'];
      const VALID_PASSWORD = 'Larhuj66';
      const KEY = 'ar_logged_in';

      document.getElementById('submitLogin').addEventListener('click', () => {
        const email = document.getElementById('emailInput').value.trim().toLowerCase();
        const pass = document.getElementById('passInput').value;
        const ok = VALID_EMAILS.includes(email) && pass === VALID_PASSWORD;
        if (!ok) {
          document.getElementById('loginError').hidden = false;
          return;
        }
        localStorage.setItem(KEY, '1');
        window.location.href = '/dashboard.html';
      });
    </script>
  </body>
</html>
