<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Automated Reception</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-blur"></div>
    <header class="topbar container">
      <div class="brand"><div class="logo-dot"></div><span>Automated Reception</span></div>
      <div class="top-actions">
        <a class="btn ghost" href="/">Home</a>
        <button id="logoutBtn" class="btn ghost" type="button">Log out</button>
      </div>
    </header>

    <main class="container" style="display:grid; gap:12px; padding-bottom:20px;">
      <section class="card" style="padding:24px;">
        <h2 style="margin-top:0;">Dashboard</h2>
        <p class="muted">Lägg in kunddata och skapa deras AI-agent direkt.</p>

        <div class="dashboard-grid diagonal-grid" style="margin-bottom:12px;">
          <article class="card stat boxed diag-a"><h4>Ditt nummer</h4><p id="yourNumber">+46 70 000 00 00</p></article>
          <article class="card stat boxed diag-b"><h4>Salongens AI-nummer</h4><p id="aiNumber">+46 10 555 12 34</p></article>
          <article class="card stat boxed diag-c"><h4>Inkommande samtal</h4><p>124</p></article>
          <article class="card stat boxed diag-d"><h4>Bokningar skapade</h4><p>37</p></article>
          <article class="card stat boxed diag-e"><h4>Svarade av AI</h4><p>91%</p></article>
          <article class="card stat boxed diag-f"><h4>SMS skickade</h4><p>35</p></article>
        </div>
      </section>

      <section class="card" style="padding:24px;">
        <h3 style="margin-top:0;">Skapa AI-agent (test)</h3>
        <form id="agentForm" style="display:grid; gap:10px;">
          <input name="salonName" placeholder="Salongsnamn" required />
          <input name="ownerName" placeholder="Ägarens namn" required />
          <input name="businessPhone" placeholder="Salongens telefonnummer" required />
          <input name="aiNumber" placeholder="AI-nummer" required />
          <input name="bookingUrl" placeholder="Bokningslänk (valfri)" />
          <input name="instagram" placeholder="Instagram (valfri)" />
          <textarea name="notes" placeholder="Övriga instruktioner (valfritt)" rows="3"></textarea>
          <button class="btn" type="submit">Skapa AI-agent</button>
        </form>
        <p id="agentMessage" class="muted" style="margin-top:10px;"></p>
      </section>

      <section class="card" style="padding:24px;">
        <h3 style="margin-top:0;">Aktiva AI-agenter</h3>
        <div id="agentsList" style="display:grid; gap:8px;"></div>
      </section>
    </main>

    <script>
      const KEY = 'ar_logged_in';
      if (localStorage.getItem(KEY) !== '1') {
        window.location.href = '/login.html';
      }

      document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.setItem(KEY, '0');
        window.location.href = '/';
      });

      const form = document.getElementById('agentForm');
      const message = document.getElementById('agentMessage');
      const agentsList = document.getElementById('agentsList');

      async function getJson(url, options) {
        const res = await fetch(url, options);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      async function loadAgents() {
        const agents = await getJson('/api/agents');
        if (!agents.length) {
          agentsList.innerHTML = '<p class="muted">Inga agenter skapade ännu.</p>';
          return;
        }

        agentsList.innerHTML = agents.slice().reverse().map(agent => `
          <article class="card" style="padding:12px;">
            <strong>${agent.salonName}</strong>
            <div class="muted">Ägare: ${agent.ownerName}</div>
            <div class="muted">AI-nummer: ${agent.aiNumber}</div>
            <div class="muted">Status: ${agent.status}</div>
          </article>
        `).join('');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        message.textContent = 'Skapar agent...';
        try {
          const payload = Object.fromEntries(new FormData(form).entries());
          const result = await getJson('/api/agents/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          message.textContent = `✅ ${result.message}: ${result.agent.salonName}`;
          form.reset();
          await loadAgents();
        } catch (err) {
          message.textContent = `❌ ${err.message}`;
        }
      });

      loadAgents().catch((err) => {
        message.textContent = `❌ ${err.message}`;
      });
    </script>
  </body>
</html>
